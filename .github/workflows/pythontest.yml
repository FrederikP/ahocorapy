name: test

on:
  # Only run on pushes to master (post-merge validation). Pushes to PR
  # branches are covered by the pull_request event below, so this avoids
  # running the suite twice for the same commits.
  push:
    branches: [master]
    paths: &code-paths
      - "src/**"
      - "tests/**"
      - "setup.py"
      - "setup.cfg"
      - "tox.ini"
      - ".github/workflows/pythontest.yml"
  pull_request:
    paths: *code-paths
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.10", "pypy3.11"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest-cov
      - name: Test with pytest
        run: |
          python -m pytest --cov src/ahocorapy/ --cov-report=xml --cov-branch tests/ahocorapy_test.py
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # Older interpreters that actions/setup-python can no longer provide, tested
  # via the official Docker images.
  test-legacy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - "python:2.7.18-buster"
          - "pypy:2.7-7.3-slim"
          - "python:3.3-slim"
          - "python:3.4-slim"
          - "python:3.5-slim"
          - "python:3.6-slim"
          - "python:3.7-slim"
          - "python:3.8-slim"

    steps:
      - uses: actions/checkout@v5
      - name: Test in ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/w -w /w ${{ matrix.image }} bash -c '
            pip install -e . &&
            pip install pytest-cov &&
            python -m pytest --cov src/ahocorapy/ --cov-report=xml --cov-branch tests/ahocorapy_test.py
          '
